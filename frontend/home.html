<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malharia São José</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>
    <div id="auth-screen" class="container">
        <div class="auth-box">
            <h1>Malharia São José</h1>
            <p class="subtitle">Gerenciador de Estoque de Roupas</p>
            
            <div class="form-group">
                <input type="email" id="auth-email" placeholder="E-mail">
                <input type="password" id="auth-senha" placeholder="Senha">
            </div>

            <div class="auth-buttons">
                <a href="./index.html"><button id="btn-login" class="btn-primary">Entrar com E-mail</button></a>
                <button id="btn-cadastro" class="btn-secondary">Criar Conta</button>
            </div>
        </div>
    </div>
</body>
</html>
